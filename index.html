<style>
  :root {
    --emerald-deep: #0f3d35;
    --emerald: #166534;
    --emerald-soft: #1f7a67;
    --orange: #c85a14;
    --orange-hover: #a9480f;
    --cream: #f7f4ee;
    --ink: #13221d;
  }

  html { scroll-behavior: smooth; }

  body {
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    background: #f6f5f2;
  }

  .hero-bg {
    background-image:
      linear-gradient(90deg, rgba(7,17,15,0.84) 0%, rgba(7,17,15,0.72) 34%, rgba(7,17,15,0.34) 60%, rgba(7,17,15,0.14) 100%),
      url('./images-rv-park-hero.jpg');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
  }

  .glass {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .soft-card {
    background: rgba(255,255,255,0.90);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.45);
    box-shadow: 0 18px 50px rgba(15, 61, 53, 0.12);
  }

  .trust-card {
    background: linear-gradient(180deg, rgba(255,255,255,.97), rgba(247,244,238,.94));
    border: 1px solid rgba(15,61,53,.08);
    box-shadow: 0 10px 35px rgba(15,61,53,.08);
  }

  .tab-active {
    color: var(--emerald);
    border-color: var(--emerald);
    background: white;
    font-weight: 800;
    box-shadow: 0 10px 25px rgba(15, 61, 53, 0.08);
  }

  .success-modal {
    animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    from {
      transform: scale(0.92) translateY(18px);
      opacity: 0;
    }
    to {
      transform: scale(1) translateY(0);
      opacity: 1;
    }
  }

  input, select, textarea {
    transition: all .25s ease;
    background: rgba(255,255,255,.97);
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--emerald);
    box-shadow: 0 0 0 4px rgba(22,101,52,.12);
    outline: none;
  }

  .hero-check li {
    position: relative;
    padding-left: 2.05rem;
  }

  .hero-check li::before {
    content: '\f00c';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    position: absolute;
    left: 0;
    top: .05rem;
    color: #bef264;
  }

  .section-anchor { scroll-margin-top: 90px; }

  .hero-copy-shadow {
    text-shadow: 0 4px 22px rgba(0,0,0,.30);
  }

  .border-soft {
    border: 1px solid rgba(15,61,53,.08);
  }

  .deal-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 36px rgba(15,61,53,.10);
  }

  @media (max-width: 1024px) {
    .hero-bg { background-position: 58% center; }
  }

  @media (max-width: 640px) {
    .hero-bg {
      background-position: 64% center;
      min-height: auto;
    }
  }
</style>
